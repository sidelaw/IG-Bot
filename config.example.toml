# Copy to config.toml and edit. config.toml is gitignored.
# SECRETS DO NOT GO HERE — they come from environment variables (see .env.example).

[general]
mode = "review"            # "review" (default) | "blind"
max_posts_per_run = 20

[paths]
work_dir = "./work"        # downloaded + normalized media (gitignored)
db_path = "./igbot.db"     # SQLite state/dedup/queue/routing/tokens (gitignored)

[reddit]
# Public, non-secret. Credentials (client id/secret) come from env.
user_agent = "igbot/0.1 (by u/your_reddit_username)"

# One block per source feed. Each feed lists its target IG account ids.
[[feeds]]
source = "reddit"
name = "landscaping-week"
subreddits = ["landscaping", "lawncare"]
time_window = "week"       # hour | day | week | month | year | all
min_score = 100
media_types = ["video", "image"]
target_accounts = ["acct_main"]

# Target Instagram accounts (non-secret metadata only; tokens via env / DB).
[[accounts]]
id = "acct_main"
username = "your_landscaping_account"
auth_flow = "instagram_login"   # instagram_login | facebook_login

# Public media host. Instagram fetches media by cURLing a public URL, so files
# are uploaded here first. S3-compatible: AWS S3 or Cloudflare R2 (set
# endpoint_url for R2). Access keys come from env, never here.
[host]
provider = "s3"
bucket = "your-igbot-media-bucket"
region = "auto"                  # "auto" for Cloudflare R2; e.g. "us-east-1" for S3
endpoint_url = ""                # R2: https://<account>.r2.cloudflarestorage.com
public_base_url = "https://media.example.com"   # CDN/public domain serving the bucket
key_prefix = "igbot"

# Instagram API. Host + version are volatile (Meta ships quarterly) — kept here,
# not hardcoded. Instagram Login flow uses graph.instagram.com. Rate limits are
# NOT configured: they're queried at runtime via content_publishing_limit.
[instagram]
graph_host = "graph.instagram.com"
api_version = "v23.0"           # verify current version against Meta docs

# Brand overlay (the "material edit" transform for reach). Applied at publish
# time only when a candidate has the overlay toggled on in the review queue.
[brand]
text = "@your_landscaping_account"
logo_path = ""                  # optional PNG/JPEG logo to composite
position = "bottom-right"        # bottom-right|bottom-left|top-right|top-left|bottom-center
font_size = 48
margin = 36
opacity = 0.85
