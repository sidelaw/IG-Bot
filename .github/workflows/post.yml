name: Post (every 2 hours)

# Every 2 hours: publish the next queued item to its Instagram account. The
# media is already on R2 from the harvest step, so no ffmpeg is needed here.
on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours, on the hour (UTC)
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[host]"
      - run: python -m igbot post-next
        env:
          # R2 access keys (secret); bucket/endpoint/url + IG account id are in
          # config.toml. Only the R2 keys + the IG token are real secrets here.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
          # Instagram token for acct_main — accept either secret name.
          IGBOT_TOKEN_ACCT_MAIN: ${{ secrets.IGBOT_TOKEN_ACCT_MAIN || secrets.IG_TOKEN }}
