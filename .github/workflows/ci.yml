name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg (provides ffmpeg + ffprobe)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install project + dev/host/ui extras
        run: pip install -e ".[host,ui,dev]"

      - name: Run tests
        run: pytest -q
