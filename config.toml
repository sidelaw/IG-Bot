# ===========================================================================
# IG-Bot settings — EDIT THIS FILE to control what gets posted where.
# This file is committed on purpose (none of it is secret). NEVER put tokens or
# keys here — those go in GitHub Secrets. Edit this right in the GitHub website
# (click the file -> pencil icon), or in your Codespace.
# ===========================================================================

[general]
mode = "blind"            # "blind" = auto-post (for the scheduled automation)
max_posts_per_run = 20

[automation]
harvest_count = 2         # top N posts to grab per subreddit, once a day
                          # (6 subreddits x 2 = ~12/day, matching ~12 posts/day
                          #  at one every 2 hours). Bump it if you want more.
brand_overlay = false     # set true to burn your [brand] text onto every post
caption_suffix = ""       # text added to the end of every caption (e.g. "#garden")

[paths]
work_dir = "./work"
db_path = "./igbot.db"

[reddit]
user_agent = "igbot/0.1 (rss reader)"

# --- WHICH SUBREDDIT GOES TO WHICH INSTAGRAM ACCOUNT --------------------------
# One [[feeds]] block per subreddit. All of these post to your one account
# (acct_main). To send a subreddit to a different account, change target_accounts.

[[feeds]]
source = "reddit"
name = "gardening"
subreddits = ["gardening"]
target_accounts = ["acct_main"]
time_window = "day"       # "day" = today's top posts
media_types = ["video", "image"]

[[feeds]]
source = "reddit"
name = "houseplants"
subreddits = ["houseplants"]
target_accounts = ["acct_main"]
time_window = "day"
media_types = ["video", "image"]

[[feeds]]
source = "reddit"
name = "vegetablegardening"
subreddits = ["vegetablegardening"]
target_accounts = ["acct_main"]
time_window = "day"
media_types = ["video", "image"]

[[feeds]]
source = "reddit"
name = "lawncare"
subreddits = ["lawncare"]
target_accounts = ["acct_main"]
time_window = "day"
media_types = ["video", "image"]

[[feeds]]
source = "reddit"
name = "oddlysatisfying"
subreddits = ["oddlysatisfying"]
target_accounts = ["acct_main"]
time_window = "day"
media_types = ["video", "image"]

[[feeds]]
source = "reddit"
name = "woodworking"
subreddits = ["woodworking"]
target_accounts = ["acct_main"]
time_window = "day"
media_types = ["video", "image"]

# --- YOUR INSTAGRAM ACCOUNT ---------------------------------------------------
# The `id` must match the secret names IGBOT_TOKEN_<ID> / IGBOT_IGID_<ID>
# (uppercased). id "acct_main" -> secrets IGBOT_TOKEN_ACCT_MAIN / IGBOT_IGID_ACCT_MAIN.

[[accounts]]
id = "acct_main"
username = "your_account"
auth_flow = "instagram_login"

# --- Storage + Instagram API (values come from GitHub Secrets via env) --------
[host]
provider = "s3"
region = "auto"
key_prefix = "igbot"
# bucket / endpoint_url / public_base_url come from the R2_* secrets.

[instagram]
graph_host = "graph.instagram.com"
api_version = "v23.0"

[brand]
text = ""                 # e.g. "@your_account" — only used if brand_overlay = true
position = "bottom-right"
font_size = 48
margin = 36
opacity = 0.85
